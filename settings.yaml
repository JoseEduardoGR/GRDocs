# ─────────────────────────────────────────
#  GR Docs - Configuration File
# ─────────────────────────────────────────

# Default mode to launch when no --mode flag is provided
# Options: local | api | none
default_mode: none

# File where the conversation context/system prompt is stored
context_file: assets/context.gr

# Port used by the API server (only applies in api mode)
port: 8000

# DOCX
prompt_docx: doc/prompt.gr

# XLSX
prompt_xlsx: xlsx/prompt.gr

# PPTX
prompt_pptx: pptx/prompt.gr

# AI model (use list_models.py to see available free models)
# Recommended free models:
#   meta-llama/llama-3.3-70b-instruct:free
#   google/gemini-2.0-flash-001:free
#   qwen/qwen3-coder:free
model: meta-llama/llama-3.3-70b-instruct:free
